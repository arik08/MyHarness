          - heading "간단한 논문 샘플" [level=3] [ref=e72]
          - heading "제목" [level=4] [ref=e73]
          - paragraph [ref=e74]: 인공지능 기반 학습 도구가 대학생의 자기주도학습에 미치는 영향
          - heading "초록" [level=4] [ref=e75]
          - paragraph [ref=e76]: 본 연구는 인공지능 기반 학습 도구가 대학생의 자기주도학습 능력 향상에 미치는 영향을 살펴보는 것을 목적으로 한다. 이를 위해 대학생 100명을 대상으로 4주간 인공지능 학습 도구를 활용한 학습 활동을 진행하였으며, 사전·사후 설문조사를 통해 자기주도학습 능력의 변화를 분석하였다. 연구 결과, 인공지능 학습 도구를 활용한 집단은 학습 계획 수립, 학습 동기, 자기평가 영역에서 유의미한 향상을 보였다. 본 연구는 인공지능 기술이 학습자의 자기주도적 학습 역량을 강화하는 데 긍정적인 역할을 할 수 있음을 시사한다.
          - paragraph [ref=e77]:
            - strong [ref=e78]: "주요어:"
            - text: 인공지능, 학습 도구, 자기주도학습, 대학생
          - heading "1. 서론" [level=4] [ref=e79]
          - paragraph [ref=e80]: 최근 인공지능 기술은 교육 분야에서 빠르게 확산되고 있다. 특히 개인별 학습 수준과 학습 속도에 맞춘 맞춤형 학습 지원이 가능해지면서, 학습자의 자기주도학습 능력을 향상시키는 도구로 주목받고 있다. 자기주도학습은 학습자가 스스로 학습 목표를 설정하고, 학습 과정을 계획하며, 결과를 평가하는 능력을 의미한다.
          - paragraph [ref=e81]: 본 연구는 인공지능 기반 학습 도구가 대학생의 자기주도학습 능력에 어떠한 영향을 미치는지 분석하고자 한다.
          - heading "2. 연구 방법" [level=4] [ref=e82]
          - heading "2.1 연구 대상" [level=5] [ref=e83]
          - paragraph [ref=e84]: 본 연구는 A대학교 재학생 100명을 대상으로 하였다. 참여자는 실험집단 50명과 통제집단 50명으로 구분하였다.
          - heading "2.2 연구 절차" [level=5] [ref=e85]
          - paragraph [ref=e86]: 실험집단은 4주 동안 인공지능 기반 학습 도구를 활용하여 학습을 진행하였다. 통제집단은 기존의 일반적인 학습 방식으로 학습을 수행하였다.
          - heading "2.3 자료 수집 및 분석" [level=5] [ref=e87]
          - paragraph [ref=e88]: 자기주도학습 능력을 측정하기 위해 사전·사후 설문조사를 실시하였다. 수집된 자료는 평균 차이 분석을 통해 비교하였다.
          - heading "3. 연구 결과" [level=4] [ref=e89]
          - paragraph [ref=e90]: 분석 결과, 실험집단은 통제집단에 비해 자기주도학습 능력 점수가 더 크게 향상되었다. 특히 학습 계획 수립 능력과 자기평가 능력에서 긍정적인 변화가 나타났다.
          - paragraph [ref=e91]: "| 구분 | 사전 평균 | 사후 평균 | |---|---:|---:| | 실험집단 | 3.21 | 4.02 | | 통제집단 | 3.18 | 3.35 |"
          - paragraph [ref=e92]: 이러한 결과는 인공지능 학습 도구가 학습자의 학습 과정을 체계적으로 관리하고, 즉각적인 피드백을 제공함으로써 자기주도학습 능력 향상에 기여할 수 있음을 보여준다.
          - heading "4. 결론" [level=4] [ref=e93]
          - paragraph [ref=e94]: 본 연구는 인공지능 기반 학습 도구가 대학생의 자기주도학습 능력 향상에 긍정적인 영향을 미칠 수 있음을 확인하였다. 특히 학습 계획 수립, 학습 동기, 자기평가 측면에서 효과가 나타났다.
          - paragraph [ref=e95]: 다만 본 연구는 연구 대상이 특정 대학의 학생으로 제한되었으며, 실험 기간이 4주로 비교적 짧다는 한계가 있다. 향후 연구에서는 다양한 학습자 집단과 장기적인 실험을 통해 인공지능 학습 도구의 효과를 보다 심층적으로 검증할 필요가 있다.
