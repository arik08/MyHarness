<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>미니 피하기 게임</title>
  <style>
    body { margin:0; height:100vh; display:grid; place-items:center; background:#111827; color:white; font-family:system-ui, sans-serif; }
    .wrap { text-align:center; }
    canvas { background:#f9fafb; border:4px solid #374151; border-radius:12px; }
    p { color:#d1d5db; margin:8px 0 14px; }
    button { padding:10px 16px; border:0; border-radius:8px; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>미니 피하기 게임</h1>
    <p>← → 방향키로 파란 플레이어를 움직여 빨간 공을 피하세요.</p>
    <canvas id="game" width="420" height="560"></canvas><br><br>
    <button onclick="restart()">다시 시작</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const player = { x: 185, y: 500, w: 50, h: 22, speed: 7 };
    const balls = [];
    const keys = {};
    let score = 0;
    let gameOver = false;
    let spawnTimer = 0;

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    function restart() {
      player.x = 185;
      balls.length = 0;
      score = 0;
      gameOver = false;
      spawnTimer = 0;
      requestAnimationFrame(loop);
    }

    function spawnBall() {
      const r = 12 + Math.random() * 14;
      balls.push({
        x: Math.random() * (canvas.width - r * 2) + r,
        y: -r,
        r,
        speed: 2.5 + Math.random() * 3 + score / 400
      });
    }

    function intersects(ball, rect) {
      const nearestX = Math.max(rect.x, Math.min(ball.x, rect.x + rect.w));
      const nearestY = Math.max(rect.y, Math.min(ball.y, rect.y + rect.h));
      return Math.hypot(ball.x - nearestX, ball.y - nearestY) < ball.r;
    }

    function update() {
      if (keys.ArrowLeft) player.x -= player.speed;
      if (keys.ArrowRight) player.x += player.speed;
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

      spawnTimer++;
      if (spawnTimer > Math.max(18, 55 - score / 20)) {
        spawnBall();
        spawnTimer = 0;
      }

      for (let i = balls.length - 1; i >= 0; i--) {
        balls[i].y += balls[i].speed;
        if (intersects(balls[i], player)) gameOver = true;
        if (balls[i].y - balls[i].r > canvas.height) balls.splice(i, 1);
      }
      score++;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#2563eb';
      ctx.fillRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = '#ef4444';
      for (const b of balls) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = '#111827';
      ctx.font = '22px system-ui';
      ctx.fillText('점수: ' + Math.floor(score / 10), 16, 34);

      if (gameOver) {
        ctx.fillStyle = 'rgba(17, 24, 39, 0.82)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = '42px system-ui';
        ctx.fillText('게임 오버', canvas.width / 2, 250);
        ctx.font = '20px system-ui';
        ctx.fillText('다시 시작 버튼을 누르세요', canvas.width / 2, 290);
        ctx.textAlign = 'left';
      }
    }

    function loop() {
      if (!gameOver) update();
      draw();
      if (!gameOver) requestAnimationFrame(loop);
    }

    restart();
  </script>
</body>
</html>
